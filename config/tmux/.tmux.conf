# ============================================================
# tmux configuration
# Theme: rose-pine moon (matches Neovim + WezTerm)
# ============================================================

# ------------------------------------------------------------
# General
# ------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # true color
set -ga terminal-overrides ",xterm-256color:Tc"

set -g mouse on                 # mouse support
set -g history-limit 50000      # scrollback
set -sg escape-time 10          # faster key response (nvim-friendly)
set -g focus-events on
setw -g mode-keys vi            # vi keys in copy mode

# 1-based, auto-renumber windows
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ------------------------------------------------------------
# Prefix: Ctrl-a (instead of Ctrl-b)
# ------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# ------------------------------------------------------------
# Splits & windows (open in current path)
# ------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ------------------------------------------------------------
# Seamless pane/split navigation with Neovim (vim-tmux-navigator)
# Ctrl-h/j/k/l moves between tmux panes AND nvim splits.
# ------------------------------------------------------------
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Resize panes (prefix + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ------------------------------------------------------------
# Copy mode (vi style)
# ------------------------------------------------------------
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# ------------------------------------------------------------
# rose-pine moon palette
# ------------------------------------------------------------
set -g @base   "#232136"
set -g @surface "#2a273f"
set -g @overlay "#393552"
set -g @muted  "#6e6a86"
set -g @subtle "#908caa"
set -g @text   "#e0def4"
set -g @love   "#eb6f92"
set -g @gold   "#f6c177"
set -g @rose   "#ea9a97"
set -g @pine   "#3e8fb0"
set -g @foam   "#9ccfd8"
set -g @iris   "#c4a7e7"

# Status bar
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#232136,fg=#e0def4"

set -g status-left-length 40
set -g status-left "#[bg=#c4a7e7,fg=#232136,bold] #S #[bg=#232136,fg=#c4a7e7]"

set -g status-right-length 80
set -g status-right "#[fg=#908caa] %Y-%m-%d #[fg=#e0def4]%H:%M #[bg=#3e8fb0,fg=#232136,bold] #h "

# Windows
setw -g window-status-format "#[fg=#6e6a86] #I:#W "
setw -g window-status-current-format "#[bg=#393552,fg=#9ccfd8,bold] #I:#W "

# Panes & messages
set -g pane-border-style "fg=#393552"
set -g pane-active-border-style "fg=#c4a7e7"
set -g message-style "bg=#393552,fg=#e0def4"
set -g mode-style "bg=#c4a7e7,fg=#232136"
